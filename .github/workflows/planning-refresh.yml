name: Refresh Planning Data

on:
  schedule:
    - cron: "0 15 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: planning-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Cork planning applications
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting Cork planning applications refresh job"
          node scripts/ingest-cork-planning-applications.mjs
          echo "Cork planning applications refresh job completed"

      - name: Refresh Cork planning commencements
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting Cork planning commencements refresh job"
          node scripts/ingest-cork-planning-commencements.mjs --months=36
          echo "Cork planning commencements refresh job completed"
